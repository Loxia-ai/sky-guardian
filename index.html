<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Guardian — Air Defense</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e17;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #ui-overlay * {
      pointer-events: auto;
    }

    .loading-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0e17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #00e5ff;
      font-family: 'Share Tech Mono', monospace;
    }

    .loading-screen h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #00e5ff;
      text-shadow: 0 0 20px rgba(0,229,255,0.5), 0 0 40px rgba(0,229,255,0.2);
      margin-bottom: 2rem;
    }

    .loading-bar-container {
      width: 300px;
      height: 4px;
      background: rgba(0,229,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #76ff03);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .loading-text {
      margin-top: 1rem;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay"></div>
    <div class="loading-screen" id="loading-screen">
      <h1>Sky Guardian</h1>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-text" id="loading-text">INITIALIZING SYSTEMS...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
